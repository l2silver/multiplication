# Static export from repo root (use this when this folder is its own GitHub repository).
#
# Setup once: Repository Settings → Pages → Build and deployment → Source: GitHub Actions
#
# Site URL: https://<owner>.github.io/<repo>/   (or https://<owner>.github.io/ if repo is <owner>.github.io)

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Compute base path for GitHub Pages
        run: |
          name="${{ github.event.repository.name }}"
          owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          if [ "$name" = "$owner_lc.github.io" ]; then
            echo "GITHUB_PAGES_BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "GITHUB_PAGES_BASE_PATH=/$name" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
